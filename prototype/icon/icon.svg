<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1024 1024"
     width="1024" height="1024"
     role="img"
     aria-label="Life-Dashboard app icon">
  <title>Life-Dashboard</title>
  <desc>A 5x5 activity heatmap on a macOS squircle. Cells rise in intensity from faint violet in the top-left to a violet-pink-amber peak in the bottom-right (today), set against a deep violet-black gradient with subtle aurora glows.</desc>

  <defs>
    <!--
      Squircle mask — iOS / macOS app icon shape.
      A rounded rectangle with rx = 229 (≈ 22.4% of the 1024 side).
      That's the value Apple uses for the iOS / macOS app icon mask, and
      it produces the unmistakable "macOS app" silhouette: long straight
      sides, full corners, neither square nor circular.
    -->
    <clipPath id="ld-squircle">
      <rect x="0" y="0" width="1024" height="1024" rx="229" ry="229"/>
    </clipPath>

    <!-- Base wash: deep violet-black with a diagonal lift toward the top-left -->
    <linearGradient id="ld-bgBase" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#1A1030"/>
      <stop offset="55%"  stop-color="#0A0612"/>
      <stop offset="100%" stop-color="#06040C"/>
    </linearGradient>

    <!-- Aurora: violet (top-right) — matches the app's aurora-1 default -->
    <radialGradient id="ld-auroraViolet" cx="0.78" cy="0.18" r="0.65">
      <stop offset="0%"   stop-color="#C4B5FD" stop-opacity="0.42"/>
      <stop offset="55%"  stop-color="#A78BFA" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0"/>
    </radialGradient>

    <!-- Aurora: pink (bottom-left) — matches the app's aurora-2 default -->
    <radialGradient id="ld-auroraPink" cx="0.18" cy="0.85" r="0.55">
      <stop offset="0%"   stop-color="#F472B6" stop-opacity="0.28"/>
      <stop offset="60%"  stop-color="#F472B6" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#F472B6" stop-opacity="0"/>
    </radialGradient>

    <!-- Top-edge glass highlight — the macOS "shine" that gives the icon depth -->
    <linearGradient id="ld-topShine" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.13"/>
      <stop offset="60%"  stop-color="#FFFFFF" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <!--
      Cell intensity ladder. Mirrors the app's heatmap ladder in
      ActivityHeatmap.tsx (cellLevel 0→4: white/4, accent/22, accent/48,
      accent/72, full accent) but composited against the dark background
      of the icon, so the colours read as "data rising in intensity".
    -->
    <linearGradient id="ld-cellFaint" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#C4B5FD" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="ld-cellLow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#C4B5FD" stop-opacity="0.24"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0.14"/>
    </linearGradient>
    <linearGradient id="ld-cellMid" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#C4B5FD" stop-opacity="0.48"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0.28"/>
    </linearGradient>
    <linearGradient id="ld-cellHigh" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#C4B5FD" stop-opacity="0.78"/>
      <stop offset="100%" stop-color="#F472B6" stop-opacity="0.50"/>
    </linearGradient>

    <!-- The peak cell: the full three-stop app gradient (violet → pink → amber) -->
    <linearGradient id="ld-cellPeak" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#C4B5FD"/>
      <stop offset="45%"  stop-color="#F472B6"/>
      <stop offset="100%" stop-color="#FBBF24"/>
    </linearGradient>

    <!-- Soft outer glow for the peak — keeps the icon from feeling flat -->
    <filter id="ld-peakGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feFlood flood-color="#F472B6" flood-opacity="0.65"/>
      <feComposite in2="SourceAlpha" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ════════════════════════════════════════════════════════════════
       Everything below is clipped to the squircle so the aurora and
       cells can spill to the edges without leaking outside the shape.
       ════════════════════════════════════════════════════════════════ -->
  <g clip-path="url(#ld-squircle)">

    <!-- 1. Base wash (always rendered first so subsequent layers blend) -->
    <rect width="1024" height="1024" fill="#06040C"/>
    <rect width="1024" height="1024" fill="url(#ld-bgBase)"/>

    <!-- 2. Aurora glows — the app's signature ambient depth -->
    <rect width="1024" height="1024" fill="url(#ld-auroraViolet)"/>
    <rect width="1024" height="1024" fill="url(#ld-auroraPink)"/>

    <!-- 3. The Life Grid: 5×5 cells, 140px each, 20px gap.
            x: 122, 282, 442, 602, 762
            y: 122, 282, 442, 602, 762
            Intensity follows a "rising tide" — faint top-left → peak bottom-right.
            The bottom-right cell is "today" and gets the full gradient + glow. -->
    <g>
      <!-- Row 0 — oldest week, all faint -->
      <rect x="122" y="122" width="140" height="140" rx="26" fill="url(#ld-cellFaint)"/>
      <rect x="282" y="122" width="140" height="140" rx="26" fill="url(#ld-cellFaint)"/>
      <rect x="442" y="122" width="140" height="140" rx="26" fill="url(#ld-cellFaint)"/>
      <rect x="602" y="122" width="140" height="140" rx="26" fill="url(#ld-cellLow)"/>
      <rect x="762" y="122" width="140" height="140" rx="26" fill="url(#ld-cellLow)"/>

      <!-- Row 1 -->
      <rect x="122" y="282" width="140" height="140" rx="26" fill="url(#ld-cellFaint)"/>
      <rect x="282" y="282" width="140" height="140" rx="26" fill="url(#ld-cellLow)"/>
      <rect x="442" y="282" width="140" height="140" rx="26" fill="url(#ld-cellLow)"/>
      <rect x="602" y="282" width="140" height="140" rx="26" fill="url(#ld-cellMid)"/>
      <rect x="762" y="282" width="140" height="140" rx="26" fill="url(#ld-cellMid)"/>

      <!-- Row 2 — center -->
      <rect x="122" y="442" width="140" height="140" rx="26" fill="url(#ld-cellLow)"/>
      <rect x="282" y="442" width="140" height="140" rx="26" fill="url(#ld-cellMid)"/>
      <rect x="442" y="442" width="140" height="140" rx="26" fill="url(#ld-cellMid)"/>
      <rect x="602" y="442" width="140" height="140" rx="26" fill="url(#ld-cellHigh)"/>
      <rect x="762" y="442" width="140" height="140" rx="26" fill="url(#ld-cellHigh)"/>

      <!-- Row 3 -->
      <rect x="122" y="602" width="140" height="140" rx="26" fill="url(#ld-cellMid)"/>
      <rect x="282" y="602" width="140" height="140" rx="26" fill="url(#ld-cellHigh)"/>
      <rect x="442" y="602" width="140" height="140" rx="26" fill="url(#ld-cellHigh)"/>
      <rect x="602" y="602" width="140" height="140" rx="26" fill="url(#ld-cellHigh)"/>
      <rect x="762" y="602" width="140" height="140" rx="26" fill="url(#ld-cellHigh)"/>

      <!-- Row 4 — this week. The bottom-right cell is the PEAK (today). -->
      <rect x="122" y="762" width="140" height="140" rx="26" fill="url(#ld-cellMid)"/>
      <rect x="282" y="762" width="140" height="140" rx="26" fill="url(#ld-cellHigh)"/>
      <rect x="442" y="762" width="140" height="140" rx="26" fill="url(#ld-cellHigh)"/>
      <rect x="602" y="762" width="140" height="140" rx="26" fill="url(#ld-cellHigh)"/>
      <rect x="762" y="762" width="140" height="140" rx="26" fill="url(#ld-cellPeak)" filter="url(#ld-peakGlow)"/>
    </g>

    <!-- 4. Top-edge glass shine — clipped to the top ~38% of the squircle -->
    <rect width="1024" height="400" fill="url(#ld-topShine)"/>
  </g>

  <!-- 5. Subtle outer stroke for crispness on light backgrounds -->
  <rect x="0" y="0" width="1024" height="1024" rx="229" ry="229"
        fill="none"
        stroke="rgba(255,255,255,0.07)"
        stroke-width="1.5"/>
</svg>
